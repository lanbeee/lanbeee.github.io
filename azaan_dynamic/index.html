<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Azaan Scheduler Dashboard</title>
  <link rel="stylesheet" href="static/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Use a specific version of adhan.js to avoid MIME type issues -->
    <script src="lib/js/adhan.umd.min.js"></script>
  <!-- Optional: Add a favicon to silence 404 error -->
  <link rel="icon" href="data:,">
</head>
<body>
  <div class="container">
    <button id="startLoopBtn">Start Azaan Loop</button>
    <div id="exerciseCounter">
      <button id="counterResetBtn" aria-label="Reset counter">⟳</button>
      <div id="counterValue">0</div>
      <div id="highScoreValue">0</div>
    </div>
    <div id="weather">
      <span id="weatherInfo">Loading weather...</span>
    </div>
    <div id="time">--:--</div>
    <div id="date">Loading date...</div>
    <div id="message">Welcome!</div>
    <div id="prayerTimesDisplay" style="position: fixed; bottom: 10px; right: 10px; font-size: 12px; background: rgba(0,0,0,0.7); color: white; padding: 5px; border-radius: 3px;">Prayer Times: Loading...</div>
    <audio id="silentAudio" src="static/silent.mp3" type="audio/mpeg"></audio>
    <audio id="prayerAudio" src="" type="audio/mpeg"></audio>
  </div>

  <script>
    // ==================== Configuration ====================
    const WEATHER_API_URL = 'https://api.openweathermap.org/data/2.5/weather';
    const DEFAULT_LOCATION = { latitude: 43, longitude: -78.79 };
    const THEME_PALETTES = {
      dawn: {
        bg: "#203040",
        text: "#F2F7FF",
        buttonBg: "#3D6CA8",
        buttonHoverBg: "#335E93",
        buttonText: "#FFFFFF",
        weatherIconFilter: "brightness(0) invert(1)"
      },
      noon: {
        bg: "#F3F7FF",
        text: "#0F1B2B",
        buttonBg: "#2D5CA6",
        buttonHoverBg: "#244D8C",
        buttonText: "#FFFFFF",
        weatherIconFilter: "none"
      },
      afternoon: {
        bg: "#FFE0B8",
        text: "#3A2208",
        buttonBg: "#D97706",
        buttonHoverBg: "#B45309",
        buttonText: "#FFFFFF",
        weatherIconFilter: "none"
      },
      sunset: {
        bg: "#5A3B5D",
        text: "#FFEBDD",
        buttonBg: "#C06A96",
        buttonHoverBg: "#A85C86",
        buttonText: "#FFFFFF",
        weatherIconFilter: "brightness(0) invert(1)"
      },
      night: {
        bg: "#121212",
        text: "#FFFFFF",
        buttonBg: "#1E88E5",
        buttonHoverBg: "#1565C0",
        buttonText: "#FFFFFF",
        weatherIconFilter: "brightness(0) invert(1)"
      }
    };

    // ==================== Elements ====================
    const silentAudio = document.getElementById("silentAudio");
    const prayerAudio = document.getElementById("prayerAudio");
    const startLoopBtn = document.getElementById("startLoopBtn");
    const timeDisplay = document.getElementById("time");
    const dateDisplay = document.getElementById("date");
    const weatherInfo = document.getElementById("weatherInfo");
    const messageDisplay = document.getElementById("message");
    const prayerTimesDisplay = document.getElementById("prayerTimesDisplay");
    const counterResetBtn = document.getElementById("counterResetBtn");
    const counterValue = document.getElementById("counterValue");
    const highScoreValue = document.getElementById("highScoreValue");

    let isLooping = false;
    let exerciseCounter = 0;
    let exerciseHighScore = 0;
    let lastCounterDate = "";
    let currentThemePhase = "";

    const COUNTER_STORAGE_KEY = "exerciseCounterState";

    function loadCounterStateFromStorage() {
      try {
        const saved = JSON.parse(localStorage.getItem(COUNTER_STORAGE_KEY) || "{}");
        exerciseCounter = Number.isFinite(saved.counter) ? saved.counter : 0;
        exerciseHighScore = Number.isFinite(saved.highScore) ? saved.highScore : 0;
        lastCounterDate = typeof saved.lastDate === "string" ? saved.lastDate : "";
      } catch (error) {
        exerciseCounter = 0;
        exerciseHighScore = 0;
        lastCounterDate = "";
      }
    }

    function formatLocalDate(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function getPrayerCalculationContext() {
      const coords = new adhan.Coordinates(DEFAULT_LOCATION.latitude, DEFAULT_LOCATION.longitude);
      const params = adhan.CalculationMethod.NorthAmerica();
      return { coords, params };
    }

    function getPrayerByName(prayers, name) {
      return prayers.find(prayer => prayer.name === name);
    }

    function applyTheme(phase) {
      if (phase === currentThemePhase) return;
      const palette = THEME_PALETTES[phase] || THEME_PALETTES.night;
      const root = document.documentElement;
      root.style.setProperty("--app-bg", palette.bg);
      root.style.setProperty("--app-text", palette.text);
      root.style.setProperty("--button-bg", palette.buttonBg);
      root.style.setProperty("--button-hover-bg", palette.buttonHoverBg);
      root.style.setProperty("--button-text", palette.buttonText);
      root.style.setProperty("--weather-icon-filter", palette.weatherIconFilter);
      currentThemePhase = phase;
    }

    function updateThemeByPrayerTimes() {
      const now = new Date();
      const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      const { coords, params } = getPrayerCalculationContext();
      const rawPrayerTimes = new adhan.PrayerTimes(coords, today, params);
      const prayers = getPrayerTimesForDay(today);

      const fajr = getPrayerByName(prayers, "Fajr").time;
      const dhuhr = getPrayerByName(prayers, "Dhuhr").time;
      const asr = getPrayerByName(prayers, "Asr").time;
      const maghrib = getPrayerByName(prayers, "Maghrib").time;
      const isha = getPrayerByName(prayers, "Isha").time;
      const sunrise = rawPrayerTimes.sunrise;

      let phase = "noon";
      if (now >= isha || now < sunrise) phase = "night";
      else if (now >= maghrib) phase = "sunset";
      else if (now >= asr) phase = "afternoon";
      else if (now >= dhuhr) phase = "noon";
      else if (now >= fajr) phase = "dawn";
      else phase = "night";

      applyTheme(phase);
    }

    function dateFromLocalIso(dateString) {
      const [year, month, day] = dateString.split("-").map(Number);
      return new Date(year, month - 1, day);
    }

    function daysBetween(fromDateString, toDateString) {
      const start = dateFromLocalIso(fromDateString);
      const end = dateFromLocalIso(toDateString);
      start.setHours(0, 0, 0, 0);
      end.setHours(0, 0, 0, 0);
      return Math.floor((end - start) / (24 * 60 * 60 * 1000));
    }

    function saveCounterState() {
      localStorage.setItem(COUNTER_STORAGE_KEY, JSON.stringify({
        counter: exerciseCounter,
        highScore: exerciseHighScore,
        lastDate: lastCounterDate
      }));
    }

    function renderCounter() {
      counterValue.textContent = String(exerciseCounter);
      highScoreValue.textContent = String(exerciseHighScore);
    }

    function applyMissedCounterDays() {
      const today = formatLocalDate(new Date());
      if (!lastCounterDate) {
        lastCounterDate = today;
        return;
      }

      const missedDays = daysBetween(lastCounterDate, today);
      if (missedDays > 0) {
        exerciseCounter += missedDays;
        exerciseHighScore = Math.max(exerciseHighScore, exerciseCounter);
        lastCounterDate = today;
      }
    }

    function syncCounterToToday() {
      applyMissedCounterDays();
      exerciseHighScore = Math.max(exerciseHighScore, exerciseCounter);
      renderCounter();
      saveCounterState();
    }

    function resetCounter() {
      exerciseCounter = 0;
      lastCounterDate = formatLocalDate(new Date());
      renderCounter();
      saveCounterState();
    }

    function scheduleNextCounterIncrement() {
      const now = new Date();
      const nextMidnight = new Date(now);
      nextMidnight.setHours(24, 0, 0, 0);
      const delay = nextMidnight.getTime() - now.getTime();
      setTimeout(() => {
        syncCounterToToday();
        scheduleNextCounterIncrement();
      }, delay);
    }

    function initializeCounter() {
      loadCounterStateFromStorage();
      syncCounterToToday();
      scheduleNextCounterIncrement();
    }

    // ==================== Time and Date ====================
    function updateTimeAndDate() {
      const now = new Date();
      let hours = now.getHours() % 12 || 12;
      const minutes = String(now.getMinutes()).padStart(2, '0');
      timeDisplay.textContent = `${hours}:${minutes}`;
      const options = { month: 'short', day: 'numeric', weekday: 'long' };
      dateDisplay.textContent = now.toLocaleDateString('en-US', options);
      updateThemeByPrayerTimes();
    }
    setInterval(updateTimeAndDate, 60000);
    updateTimeAndDate();

    // ==================== Weather ====================
    async function fetchWeather() {
      const url = 'https://fragrant-frost-a94d.nabeeliitr.workers.dev/';
      try {
        const response = await fetch(url);
        if (!response.ok) throw new Error('Weather data fetch failed.');
        const data = await response.json();
        const temperature = Math.round(data.main.feels_like);
        const weatherDescription = data.weather[0].description;
        const iconCode = data.weather[0].icon;
        // Use HTTPS for weather icon to avoid mixed content warning
        const iconUrl = `https://openweathermap.org/img/wn/${iconCode}@2x.png`;
        weatherInfo.innerHTML = `
          <img src="${iconUrl}" alt="${weatherDescription}">
          ${temperature}°C, ${weatherDescription.charAt(0).toUpperCase() + weatherDescription.slice(1)}
        `;
      } catch (error) {
        console.error(error);
        weatherInfo.textContent = 'Unable to load weather data.';
      }
    }
    fetchWeather();
    setInterval(fetchWeather, 10 * 60 * 1000);

    // ==================== Message Section ====================
    function updateMessage() {
      const now = new Date();
      const hours = now.getHours();
      let message = "Welcome!";
      if (hours >= 22 || hours < 5) message = "Time to Sleep";
      else if (hours >= 5 && hours < 12) message = "Good Morning!";
      else if (hours >= 12 && hours < 17) message = "Good Afternoon!";
      else if (hours >= 17 && hours < 20) message = "Good Evening!";
      else if (hours >= 20 && hours < 22) message = "Relax and Unwind";
      messageDisplay.textContent = message;
    }
    setInterval(updateMessage, 60000);
    updateMessage();
    initializeCounter();
    counterResetBtn.addEventListener("click", resetCounter);

    // ==================== Helper Functions ====================
    function timeUntilNext2AM() {
      const now = new Date();
      const next2AM = new Date(now);
      next2AM.setHours(2, 0, 0, 0);
      if (next2AM < now) {
        next2AM.setDate(next2AM.getDate() + 1);
      }
      return next2AM - now;
    }

    function getPrayerTimesForDay(date) {
      const { coords, params } = getPrayerCalculationContext();
      const prayerTimes = new adhan.PrayerTimes(coords, date, params);
      // const preFajrTime = new Date(prayerTimes.fajr);
      // preFajrTime.setMinutes(preFajrTime.getMinutes() - 20);
      const preSunRiseTime = new Date(prayerTimes.sunrise);
      preSunRiseTime.setMinutes(preSunRiseTime.getMinutes() - 30);
      const nextDay = new Date(date);
      nextDay.setDate(nextDay.getDate() + 1);
      const nextDayPrayerTimes = new adhan.PrayerTimes(coords, nextDay, params);
      const sunriseMinus8Hours = new Date(nextDayPrayerTimes.sunrise.getTime() - (8 * 60 * 60 * 1000));
      const adjustedIshaTime = new Date(Math.max(sunriseMinus8Hours.getTime(), prayerTimes.isha.getTime()));
      
      return [
        // { name: "Pre-Fajr", time: preFajrTime, audioSrc: "static/azaan.mp3" }, // for Ramadan
        // { name: "Fajr", time: prayerTimes.fajr, audioSrc: "static/fajr.mp3" }, // for Ramadan
        { name: "Fajr", time: preSunRiseTime, audioSrc: "static/fajr.mp3" },
        { name: "Dhuhr", time: prayerTimes.dhuhr, audioSrc: "static/azaan.mp3" },
        { name: "Asr", time: prayerTimes.asr, audioSrc: "static/azaan.mp3" },
        { name: "Maghrib", time: prayerTimes.maghrib, audioSrc: "static/azaan.mp3" },
        { name: "Isha", time: adjustedIshaTime, audioSrc: "static/azaan.mp3" }
      ];
    }

    function updatePrayerTimesDisplay(prayers) {
      const times = prayers.map(prayer => {
        const time = prayer.time.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        return ` ${time}`;
      }).join(',');
      // prayerTimesDisplay.textContent = `Times: ${times}`;
      prayerTimesDisplay.textContent = `Times:${times.replace(/ 0/g, " ").replace(/AM|PM/g, "")}`;
    }

    // ==================== Azaan Scheduling ====================
    function scheduleAzaan(prayers) {
      const now = new Date();
      prayers.forEach(prayer => {
        const delay = prayer.time.getTime() - now.getTime();
        if (delay > 0) {
          setTimeout(() => playAzaanOnce(prayer.audioSrc, prayer.name), delay);
          console.log(`Scheduled ${prayer.name} Azaan at ${prayer.time.toLocaleTimeString()}`);
        }
      });
      updatePrayerTimesDisplay(prayers);
    }

    function playAzaanOnce(audioSrc, prayerName) {
      prayerAudio.src = audioSrc;
      prayerAudio.volume = 1;
      prayerAudio.currentTime = 0;
      prayerAudio.play()
        .then(() => console.log(`${prayerName} Azaan started playing.`))
        .catch(err => console.error(`Error playing ${prayerName} Azaan:`, err));
    }

    function dailyUpdate() {
      const now = new Date();
      const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      const prayers = getPrayerTimesForDay(today);
      scheduleAzaan(prayers);
      const delayUntilNext2AM = timeUntilNext2AM();
      setTimeout(dailyUpdate, delayUntilNext2AM);
      console.log(`Daily update performed at ${now.toLocaleTimeString()}`);
    }

    // ==================== Start Silent Loop & Scheduling ====================
    function startSilentLoop() {
      if (!isLooping) {
        isLooping = true;
        startLoopBtn.disabled = true;
        startLoopBtn.classList.add("hidden");

        silentAudio.volume = 0;
        silentAudio.loop = true;
        silentAudio.play()
          .then(() => console.log("Silent loop started."))
          .catch(err => console.error("Error starting silent loop:", err));

        const today = new Date();
        const prayers = getPrayerTimesForDay(today);
        scheduleAzaan(prayers);

        const delayUntil2AM = timeUntilNext2AM();
        setTimeout(dailyUpdate, delayUntil2AM);

        console.log("Azaan scheduling initialized.");
      }
    }
    startLoopBtn.addEventListener("click", startSilentLoop);

    // ==================== Keep-Alive Mechanisms ====================
    function sendHeartbeat() {
      let heartbeat = document.getElementById('heartbeat');
      if (!heartbeat) {
        heartbeat = document.createElement('div');
        heartbeat.id = 'heartbeat';
        heartbeat.style.display = 'none';
        document.body.appendChild(heartbeat);
      }
      heartbeat.textContent = new Date().toISOString();
    }

    function checkAudioLoop() {
      if (silentAudio.paused && isLooping) {
        silentAudio.play()
          .then(() => console.log("Silent audio loop restarted."))
          .catch(err => console.error("Error restarting silent audio loop:", err));
      }
    }

    function reinitializeAudioLoop() {
      if (isLooping) {
        silentAudio.pause();
        silentAudio.currentTime = 0;
        silentAudio.play()
          .then(() => console.log("Silent audio loop reinitialized."))
          .catch(err => console.error("Error reinitializing silent audio loop:", err));
      }
    }

    function simulateUserInteraction() {
      const event = new MouseEvent('mousemove', { view: window, bubbles: true, cancelable: true });
      document.dispatchEvent(event);
    }

    setInterval(() => {
      sendHeartbeat();
      checkAudioLoop();
      reinitializeAudioLoop();
      simulateUserInteraction();
    }, 5 * 60 * 1000);

    sendHeartbeat();
  </script>
</body>
</html>
