<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <title>Azaan Scheduler Dashboard</title>
  <link rel="stylesheet" href="static/styles.css">
  <link rel="icon" href="data:,">
  <script src="lib/js/adhan.umd.min.js"></script>
  <script src="static/worldcities.generated.js"></script>
</head>
<body>
  <div class="app-shell">
    <header class="top-bar" aria-label="Dashboard controls">
      <div class="date-block">
        <div id="dateDay">Loading...</div>
        <div id="dateValue">--</div>
      </div>

      <button id="startLoopBtn">Start Azaan Loop</button>

      <div class="top-actions">
        <div id="weather">
          <span id="weatherInfo">Loading weather...</span>
        </div>
      </div>
    </header>

    <main class="center-stage">
      <div id="time" aria-live="polite">--:--</div>
      <section id="dayPlan" aria-label="Daily guidance">
        <div id="message">Loading...</div>
      </section>
    </main>

    <aside id="settingsPanel" class="settings-panel" aria-hidden="true">
      <div class="panel-header">
        <div>
          <h2>Menu</h2>
          <p id="selectedLocationLabel">Location loading...</p>
        </div>
        <button id="closeMenuBtn" class="icon-button" type="button" aria-label="Close settings">×</button>
      </div>

      <section class="panel-section">
        <h3>Timing</h3>
        <label for="wakeOffsetInput">Fajr/get-up azaan before sunrise</label>
        <div class="inline-field">
          <input id="wakeOffsetInput" type="number" min="0" max="180" step="5">
          <span>min</span>
        </div>
        <label for="sleepHoursInput">Sleep target before sunrise</label>
        <div class="inline-field">
          <input id="sleepHoursInput" type="number" min="4" max="12" step="0.25">
          <span>hours</span>
        </div>
        <button id="saveTimingBtn" class="panel-action" type="button">Save timing</button>
        <p id="timingSavedMsg" class="hint" aria-live="polite"></p>
      </section>

      <section class="panel-section">
        <h3>Display</h3>
        <label for="fontSelect">Font</label>
        <select id="fontSelect">
          <option value="rounded">Rounded</option>
          <option value="system">System</option>
          <option value="ember">Amazon Ember</option>
          <option value="roboto">Roboto</option>
          <option value="arial">Arial</option>
          <option value="verdana">Verdana</option>
          <option value="trebuchet">Trebuchet</option>
          <option value="serif">Serif</option>
          <option value="georgia">Georgia</option>
          <option value="mono">Mono</option>
        </select>

        <label for="clockScaleInput">Clock size</label>
        <div class="range-field">
          <input id="clockScaleInput" type="range" min="0.85" max="1.25" step="0.01">
          <output id="clockScaleValue" for="clockScaleInput">100%</output>
        </div>

        <label for="dateScaleInput">Date size</label>
        <div class="range-field">
          <input id="dateScaleInput" type="range" min="0.85" max="1.35" step="0.01">
          <output id="dateScaleValue" for="dateScaleInput">100%</output>
        </div>

        <label for="weatherScaleInput">Weather size</label>
        <div class="range-field">
          <input id="weatherScaleInput" type="range" min="0.85" max="1.4" step="0.01">
          <output id="weatherScaleValue" for="weatherScaleInput">100%</output>
        </div>

        <label for="messageScaleInput">Bottom text size</label>
        <div class="range-field">
          <input id="messageScaleInput" type="range" min="0.85" max="1.35" step="0.01">
          <output id="messageScaleValue" for="messageScaleInput">100%</output>
        </div>

        <label for="guidanceToneSelect">Bottom text style</label>
        <select id="guidanceToneSelect">
          <option value="warm">Warm</option>
          <option value="plain">Plain</option>
        </select>

        <label class="toggle-row" for="emojiToggle">
          <input id="emojiToggle" type="checkbox">
          <span>Show small emojis</span>
        </label>

        <button id="saveDisplayBtn" class="panel-action" type="button">Save display</button>
        <p id="displaySavedMsg" class="hint" aria-live="polite"></p>
      </section>

      <section class="panel-section">
        <h3>Location</h3>
        <label for="countrySelect">Country</label>
        <select id="countrySelect">
          <option>Loading countries...</option>
        </select>
        <label for="citySelect">City</label>
        <select id="citySelect" disabled>
          <option>Select a country first</option>
        </select>
        <p id="locationStatus" class="hint" aria-live="polite">Loading city list...</p>
        <p class="hint">Saved locally on this device and used for prayer times, theme timing, and weather when available.</p>
      </section>

    </aside>

    <button id="panelScrim" class="panel-scrim" type="button" aria-label="Close settings"></button>

    <audio id="silentAudio" src="static/silent.mp3" type="audio/mpeg"></audio>
    <audio id="prayerAudio" src="" type="audio/mpeg"></audio>
  </div>

  <script>
    const WEATHER_PROXY_URL = "https://fragrant-frost-a94d.nabeeliitr.workers.dev/";
    const DEFAULT_LOCATION = {
      city: "Buffalo, New York",
      country: "United States",
      latitude: 42.9018,
      longitude: -78.8487
    };
    const APP_SETTINGS_KEY = "azaanDashboardSettings";
    const THEME_TRANSITION_DURATION_MS = 30 * 60 * 1000;
    const DEFAULT_ROUTINE = {
      wakeOffsetMinutes: 30,
      sleepHoursBeforeSunrise: 8,
      dinnerOffsetMinutes: 45,
      teaBeforeMaghribMinutes: 45
    };
    const DEFAULT_DISPLAY = {
      font: "rounded",
      clockScale: 1,
      dateScale: 1,
      weatherScale: 1,
      messageScale: 1,
      guidanceTone: "warm",
      showEmojis: true
    };
    const FONT_STACKS = {
      rounded: 'ui-rounded, "Avenir Next", "Nunito Sans", system-ui, sans-serif',
      system: '-apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif',
      ember: '"Amazon Ember", "Helvetica Neue", Arial, sans-serif',
      roboto: 'Roboto, "Droid Sans", Arial, sans-serif',
      arial: 'Arial, Helvetica, sans-serif',
      verdana: 'Verdana, Geneva, sans-serif',
      trebuchet: '"Trebuchet MS", Arial, sans-serif',
      serif: 'Georgia, "New York", "Times New Roman", serif',
      georgia: 'Georgia, "Times New Roman", serif',
      mono: 'ui-monospace, "SFMono-Regular", "SF Mono", Menlo, Consolas, monospace'
    };

    const THEME_PALETTES = {
      preDawn: { bg: "#C8D8E8", text: "#1A2A3A", buttonBg: "#3D6CA8", buttonHoverBg: "#335E93", buttonText: "#FFFFFF", weatherIconFilter: "none" },
      morning: { bg: "#1A2F45", text: "#E8F4FF", buttonBg: "#4A90D9", buttonHoverBg: "#357ABD", buttonText: "#FFFFFF", weatherIconFilter: "brightness(0) invert(1)" },
      noon: { bg: "#F3F7FF", text: "#0F1B2B", buttonBg: "#2D5CA6", buttonHoverBg: "#244D8C", buttonText: "#FFFFFF", weatherIconFilter: "none" },
      afternoon: { bg: "#7A3B00", text: "#FFE8CC", buttonBg: "#EA580C", buttonHoverBg: "#C2410C", buttonText: "#FFFFFF", weatherIconFilter: "brightness(0) invert(1)" },
      evening: { bg: "#F2D9E8", text: "#3B1A2A", buttonBg: "#C06A96", buttonHoverBg: "#A85C86", buttonText: "#FFFFFF", weatherIconFilter: "none" },
      night: { bg: "#121212", text: "#FFFFFF", buttonBg: "#1E88E5", buttonHoverBg: "#1565C0", buttonText: "#FFFFFF", weatherIconFilter: "brightness(0) invert(1)" }
    };

    const silentAudio = document.getElementById("silentAudio");
    const prayerAudio = document.getElementById("prayerAudio");
    const startLoopBtn = document.getElementById("startLoopBtn");
    const timeDisplay = document.getElementById("time");
    const dateDayDisplay = document.getElementById("dateDay");
    const dateValueDisplay = document.getElementById("dateValue");
    const weatherInfo = document.getElementById("weatherInfo");
    const messageDisplay = document.getElementById("message");
    const closeMenuBtn = document.getElementById("closeMenuBtn");
    const settingsPanel = document.getElementById("settingsPanel");
    const panelScrim = document.getElementById("panelScrim");
    const countrySelect = document.getElementById("countrySelect");
    const citySelect = document.getElementById("citySelect");
    const locationStatus = document.getElementById("locationStatus");
    const selectedLocationLabel = document.getElementById("selectedLocationLabel");
    const wakeOffsetInput = document.getElementById("wakeOffsetInput");
    const sleepHoursInput = document.getElementById("sleepHoursInput");
    const saveTimingBtn = document.getElementById("saveTimingBtn");
    const timingSavedMsg = document.getElementById("timingSavedMsg");
    const fontSelect = document.getElementById("fontSelect");
    const clockScaleInput = document.getElementById("clockScaleInput");
    const clockScaleValue = document.getElementById("clockScaleValue");
    const dateScaleInput = document.getElementById("dateScaleInput");
    const dateScaleValue = document.getElementById("dateScaleValue");
    const weatherScaleInput = document.getElementById("weatherScaleInput");
    const weatherScaleValue = document.getElementById("weatherScaleValue");
    const messageScaleInput = document.getElementById("messageScaleInput");
    const messageScaleValue = document.getElementById("messageScaleValue");
    const guidanceToneSelect = document.getElementById("guidanceToneSelect");
    const emojiToggle = document.getElementById("emojiToggle");
    const saveDisplayBtn = document.getElementById("saveDisplayBtn");
    const displaySavedMsg = document.getElementById("displaySavedMsg");

    let isLooping = false;
    let currentThemePhase = "";
    let currentTransitionPhase = "";
    let cachedThemeTimelineDate = "";
    let cachedThemeTimeline = [];
    let currentLocation = { ...DEFAULT_LOCATION };
    let settings = loadSettings();
    let citiesByCountry = new Map();
    let scheduledPrayerTimeouts = [];
    let scheduledThemeTimeouts = [];
    let dailyUpdateTimeout = null;

    function loadSettings() {
      try {
        const saved = JSON.parse(localStorage.getItem(APP_SETTINGS_KEY) || "{}");
        return {
          location: { ...DEFAULT_LOCATION },
          routine: { ...DEFAULT_ROUTINE },
          display: { ...DEFAULT_DISPLAY },
          ...saved,
          location: { ...DEFAULT_LOCATION, ...(saved.location || {}) },
          routine: { ...DEFAULT_ROUTINE, ...(saved.routine || {}) },
          display: { ...DEFAULT_DISPLAY, ...(saved.display || {}) }
        };
      } catch (error) {
        return { location: { ...DEFAULT_LOCATION }, routine: { ...DEFAULT_ROUTINE }, display: { ...DEFAULT_DISPLAY } };
      }
    }

    function saveSettings() {
      localStorage.setItem(APP_SETTINGS_KEY, JSON.stringify(settings));
    }

    function getRoutineSettings() {
      settings.routine = { ...DEFAULT_ROUTINE, ...(settings.routine || {}) };
      return settings.routine;
    }

    function getDisplaySettings() {
      settings.display = { ...DEFAULT_DISPLAY, ...(settings.display || {}) };
      return settings.display;
    }

    function clampNumber(value, min, max, fallback) {
      const number = Number(value);
      if (!Number.isFinite(number)) return fallback;
      return Math.max(min, Math.min(max, number));
    }

    function formatPercent(value) {
      return `${Math.round(value * 100)}%`;
    }

    function applyDisplaySettings() {
      const display = getDisplaySettings();
      const root = document.documentElement;
      root.style.setProperty("--dashboard-font", FONT_STACKS[display.font] || FONT_STACKS.rounded);
      root.style.setProperty("--clock-scale", clampNumber(display.clockScale, 0.85, 1.25, DEFAULT_DISPLAY.clockScale));
      root.style.setProperty("--date-scale", clampNumber(display.dateScale, 0.85, 1.35, DEFAULT_DISPLAY.dateScale));
      root.style.setProperty("--weather-scale", clampNumber(display.weatherScale, 0.85, 1.4, DEFAULT_DISPLAY.weatherScale));
      root.style.setProperty("--message-scale", clampNumber(display.messageScale, 0.85, 1.35, DEFAULT_DISPLAY.messageScale));
      updateGuidance();
    }

    function renderTimingControls() {
      const routine = getRoutineSettings();
      wakeOffsetInput.value = routine.wakeOffsetMinutes;
      sleepHoursInput.value = routine.sleepHoursBeforeSunrise;
    }

    function renderDisplayControls() {
      const display = getDisplaySettings();
      fontSelect.value = FONT_STACKS[display.font] ? display.font : DEFAULT_DISPLAY.font;
      clockScaleInput.value = clampNumber(display.clockScale, 0.85, 1.25, DEFAULT_DISPLAY.clockScale);
      dateScaleInput.value = clampNumber(display.dateScale, 0.85, 1.35, DEFAULT_DISPLAY.dateScale);
      weatherScaleInput.value = clampNumber(display.weatherScale, 0.85, 1.4, DEFAULT_DISPLAY.weatherScale);
      messageScaleInput.value = clampNumber(display.messageScale, 0.85, 1.35, DEFAULT_DISPLAY.messageScale);
      guidanceToneSelect.value = display.guidanceTone === "plain" ? "plain" : "warm";
      emojiToggle.checked = Boolean(display.showEmojis);
      clockScaleValue.textContent = formatPercent(Number(clockScaleInput.value));
      dateScaleValue.textContent = formatPercent(Number(dateScaleInput.value));
      weatherScaleValue.textContent = formatPercent(Number(weatherScaleInput.value));
      messageScaleValue.textContent = formatPercent(Number(messageScaleInput.value));
    }

    function readDisplayControls() {
      return {
        font: FONT_STACKS[fontSelect.value] ? fontSelect.value : DEFAULT_DISPLAY.font,
        clockScale: clampNumber(clockScaleInput.value, 0.85, 1.25, DEFAULT_DISPLAY.clockScale),
        dateScale: clampNumber(dateScaleInput.value, 0.85, 1.35, DEFAULT_DISPLAY.dateScale),
        weatherScale: clampNumber(weatherScaleInput.value, 0.85, 1.4, DEFAULT_DISPLAY.weatherScale),
        messageScale: clampNumber(messageScaleInput.value, 0.85, 1.35, DEFAULT_DISPLAY.messageScale),
        guidanceTone: guidanceToneSelect.value === "plain" ? "plain" : "warm",
        showEmojis: emojiToggle.checked
      };
    }

    function previewDisplaySettings() {
      settings.display = readDisplayControls();
      renderDisplayControls();
      applyDisplaySettings();
    }

    function saveDisplaySettings() {
      settings.display = readDisplayControls();
      saveSettings();
      renderDisplayControls();
      applyDisplaySettings();
      displaySavedMsg.textContent = "Saved.";
      setTimeout(() => {
        displaySavedMsg.textContent = "";
      }, 2200);
    }

    function saveTimingSettings() {
      settings.routine = {
        ...getRoutineSettings(),
        wakeOffsetMinutes: clampNumber(wakeOffsetInput.value, 0, 180, DEFAULT_ROUTINE.wakeOffsetMinutes),
        sleepHoursBeforeSunrise: clampNumber(sleepHoursInput.value, 4, 12, DEFAULT_ROUTINE.sleepHoursBeforeSunrise)
      };
      saveSettings();
      cachedThemeTimelineDate = "";
      updateThemeByPrayerTimes();
      scheduleThemeBoundaryRefreshes();
      if (isLooping) rescheduleAzaan();
      renderTimingControls();
      updateGuidance();
      timingSavedMsg.textContent = "Saved.";
      setTimeout(() => {
        timingSavedMsg.textContent = "";
      }, 2200);
    }

    function parseCsvLine(line) {
      const values = [];
      let current = "";
      let inQuotes = false;
      for (let index = 0; index < line.length; index += 1) {
        const char = line[index];
        const next = line[index + 1];
        if (char === '"' && next === '"') {
          current += '"';
          index += 1;
        } else if (char === '"') {
          inQuotes = !inQuotes;
        } else if (char === "," && !inQuotes) {
          values.push(current);
          current = "";
        } else {
          current += char;
        }
      }
      values.push(current);
      return values;
    }

    async function loadCityData() {
      try {
        countrySelect.disabled = true;
        citySelect.disabled = true;
        locationStatus.textContent = "Loading city list...";
        if (window.WORLD_CITIES_DATA) {
          processGeneratedCityData(window.WORLD_CITIES_DATA);
          populateCountrySelect();
          applySavedLocationToSelects();
          locationStatus.textContent = `${citiesByCountry.size} countries loaded from generated data.`;
          return;
        }
        if (window.location.protocol === "file:") {
          throw new Error("Local file mode blocks automatic CSV loading. Run scripts/convert-worldcities.js to create static/worldcities.generated.js.");
        }
        const response = await fetch("static/worldcities.csv");
        if (!response.ok) throw new Error("City data unavailable.");
        processCityCsvText(await response.text());
        populateCountrySelect();
        applySavedLocationToSelects();
        locationStatus.textContent = `${citiesByCountry.size} countries loaded.`;
      } catch (error) {
        console.error(error);
        replaceSelectOptions(countrySelect, [{ value: "", label: "City list unavailable" }]);
        replaceSelectOptions(citySelect, [{ value: "", label: "Using saved/default location" }]);
        countrySelect.disabled = true;
        citySelect.disabled = true;
        locationStatus.textContent = window.location.protocol === "file:"
          ? "Browser security blocks automatic city loading from file://. Open via http://localhost."
          : "City list could not load. Check that static/worldcities.csv is reachable.";
      }
    }

    function processGeneratedCityData(cityData) {
      citiesByCountry = new Map();
      Object.entries(cityData).forEach(([country, cities]) => {
        citiesByCountry.set(country, cities
          .map(([city, latitude, longitude]) => ({ city, country, latitude: Number(latitude), longitude: Number(longitude) }))
          .filter((entry) => entry.city && Number.isFinite(entry.latitude) && Number.isFinite(entry.longitude))
          .sort((a, b) => a.city.localeCompare(b.city)));
      });
    }

    function processCityCsvText(csvText) {
      citiesByCountry = new Map();
      const rows = csvText.trim().split(/\r?\n/).slice(1);
      rows.forEach((line) => {
        const [city, lat, lng, country] = parseCsvLine(line);
        if (!city || !country) return;
        const entry = { city, country, latitude: Number(lat), longitude: Number(lng) };
        if (!Number.isFinite(entry.latitude) || !Number.isFinite(entry.longitude)) return;
        if (!citiesByCountry.has(country)) citiesByCountry.set(country, []);
        citiesByCountry.get(country).push(entry);
      });
      for (const cities of citiesByCountry.values()) {
        cities.sort((a, b) => a.city.localeCompare(b.city));
      }
    }

    function replaceSelectOptions(selectEl, options) {
      selectEl.replaceChildren();
      options.forEach(({ value, label, selected }) => {
        const option = document.createElement("option");
        option.value = value;
        option.textContent = label;
        option.selected = Boolean(selected);
        selectEl.appendChild(option);
      });
    }

    function populateCountrySelect() {
      const countries = [...citiesByCountry.keys()].sort((a, b) => a.localeCompare(b));
      replaceSelectOptions(countrySelect, countries.map((country) => ({ value: country, label: country })));
      countrySelect.disabled = false;
    }

    function populateCitySelect(country, selectedCity = "") {
      const cities = citiesByCountry.get(country) || [];
      replaceSelectOptions(citySelect, cities.map((item, index) => ({
        value: String(index),
        label: item.city,
        selected: item.city === selectedCity
      })));
      citySelect.disabled = cities.length === 0;
      locationStatus.textContent = cities.length
        ? `${cities.length} cities available for ${country}.`
        : `No cities found for ${country}.`;
    }

    function applySavedLocationToSelects() {
      const savedLocation = settings.location || DEFAULT_LOCATION;
      const country = citiesByCountry.has(savedLocation.country) ? savedLocation.country : DEFAULT_LOCATION.country;
      countrySelect.value = country;
      populateCitySelect(country, savedLocation.city);
      const selectedCity = getSelectedCity();
      if (selectedCity) updateLocation(selectedCity, false);
    }

    function getSelectedCity() {
      const cities = citiesByCountry.get(countrySelect.value) || [];
      return cities[Number(citySelect.value)] || cities.find((city) => city.city === currentLocation.city) || cities[0];
    }

    function updateLocation(location, persist = true) {
      currentLocation = { ...location };
      settings.location = { ...location };
      if (persist) saveSettings();
      selectedLocationLabel.textContent = `${currentLocation.city}, ${currentLocation.country}`;
      locationStatus.textContent = `Using ${currentLocation.city}, ${currentLocation.country}.`;
      cachedThemeTimelineDate = "";
      updateThemeByPrayerTimes();
      scheduleThemeBoundaryRefreshes();
      fetchWeather();
      if (isLooping) rescheduleAzaan();
      updateGuidance();
    }

    function formatLocalDate(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function getPrayerCalculationContext() {
      const coords = new adhan.Coordinates(currentLocation.latitude, currentLocation.longitude);
      const params = adhan.CalculationMethod.NorthAmerica();
      return { coords, params };
    }

    function getPrayerByName(prayers, name) {
      return prayers.find((prayer) => prayer.name === name);
    }

    function setThemeVars(prefix, palette) {
      const root = document.documentElement;
      root.style.setProperty(`${prefix}app-bg`, palette.bg);
      root.style.setProperty(`${prefix}app-text`, palette.text);
      root.style.setProperty(`${prefix}button-bg`, palette.buttonBg);
      root.style.setProperty(`${prefix}button-hover-bg`, palette.buttonHoverBg);
      root.style.setProperty(`${prefix}button-text`, palette.buttonText);
      root.style.setProperty(`${prefix}weather-icon-filter`, palette.weatherIconFilter);
    }

    function applyTheme(phase, transition = null) {
      const palette = THEME_PALETTES[phase] || THEME_PALETTES.night;
      const root = document.documentElement;
      if (phase !== currentThemePhase) {
        setThemeVars("--", palette);
        currentThemePhase = phase;
      }
      if (transition) {
        const nextPalette = THEME_PALETTES[transition.nextPhase] || THEME_PALETTES.night;
        if (transition.nextPhase !== currentTransitionPhase) {
          setThemeVars("--next-", nextPalette);
          currentTransitionPhase = transition.nextPhase;
        }
        root.style.setProperty("--theme-split", `${transition.progress}%`);
        root.classList.add("theme-transitioning");
        updateViewportClipTargets(Number(transition.progress));
      } else {
        root.style.setProperty("--theme-split", "0%");
        root.classList.remove("theme-transitioning");
        currentTransitionPhase = "";
        updateViewportClipTargets(0);
      }
    }

    function getElementSplitPercent(element, globalProgress) {
      if (!element) return 0;
      const rect = element.getBoundingClientRect();
      if (!rect.width) return 0;
      const splitX = window.innerWidth * (globalProgress / 100);
      return Math.max(0, Math.min(100, ((splitX - rect.left) / rect.width) * 100));
    }

    function updateViewportClipTargets(globalProgress) {
      messageDisplay.style.setProperty("--message-split", `${getElementSplitPercent(messageDisplay, globalProgress)}%`);
      document.querySelectorAll(".weatherIconWrap").forEach((element) => {
        element.style.setProperty("--icon-split", `${getElementSplitPercent(element, globalProgress)}%`);
      });
    }

    function buildThemeTimelineForDay(date) {
      const day = new Date(date.getFullYear(), date.getMonth(), date.getDate());
      const { coords, params } = getPrayerCalculationContext();
      const rawPrayerTimes = new adhan.PrayerTimes(coords, day, params);
      const prayers = getPrayerTimesForDay(day);
      return [
        { time: getPrayerByName(prayers, "Fajr").time, phase: "preDawn" },
        { time: rawPrayerTimes.sunrise, phase: "morning" },
        { time: getPrayerByName(prayers, "Dhuhr").time, phase: "noon" },
        { time: getPrayerByName(prayers, "Asr").time, phase: "afternoon" },
        { time: getPrayerByName(prayers, "Maghrib").time, phase: "evening" },
        { time: getPrayerByName(prayers, "Isha").time, phase: "night" }
      ].sort((a, b) => a.time - b.time);
    }

    function getThemeState(now = new Date()) {
      const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      const cacheKey = `${formatLocalDate(today)}:${currentLocation.latitude}:${currentLocation.longitude}`;
      if (cacheKey !== cachedThemeTimelineDate) {
        const yesterday = new Date(today);
        yesterday.setDate(yesterday.getDate() - 1);
        const tomorrow = new Date(today);
        tomorrow.setDate(tomorrow.getDate() + 1);
        cachedThemeTimeline = [
          ...buildThemeTimelineForDay(yesterday),
          ...buildThemeTimelineForDay(today),
          ...buildThemeTimelineForDay(tomorrow)
        ].sort((a, b) => a.time - b.time);
        cachedThemeTimelineDate = cacheKey;
      }
      let activeIndex = cachedThemeTimeline.findIndex((event, index) => {
        const nextEvent = cachedThemeTimeline[index + 1];
        return now >= event.time && (!nextEvent || now < nextEvent.time);
      });
      if (activeIndex === -1) activeIndex = 0;
      const activeEvent = cachedThemeTimeline[activeIndex];
      const nextEvent = cachedThemeTimeline[activeIndex + 1];
      const state = { phase: activeEvent.phase, transition: null };
      if (nextEvent) {
        const transitionStart = nextEvent.time.getTime() - THEME_TRANSITION_DURATION_MS;
        const nowTime = now.getTime();
        if (nowTime >= transitionStart && nowTime < nextEvent.time.getTime()) {
          state.transition = {
            nextPhase: nextEvent.phase,
            progress: Math.max(0, Math.min(100, ((nowTime - transitionStart) / THEME_TRANSITION_DURATION_MS) * 100)).toFixed(4)
          };
        }
      }
      return state;
    }

    function updateThemeByPrayerTimes() {
      const themeState = getThemeState();
      applyTheme(themeState.phase, themeState.transition);
    }

    function updateThemeAfterBoundary() {
      updateThemeByPrayerTimes();
      setTimeout(updateThemeByPrayerTimes, 1000);
    }

    function scheduleThemeBoundaryRefreshes() {
      scheduledThemeTimeouts.forEach(clearTimeout);
      scheduledThemeTimeouts = [];
      const now = new Date();
      const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      const tomorrow = new Date(today);
      tomorrow.setDate(tomorrow.getDate() + 1);
      const events = [
        ...buildThemeTimelineForDay(today),
        ...buildThemeTimelineForDay(tomorrow)
      ];
      events.forEach((event) => {
        const delay = event.time.getTime() - now.getTime();
        if (delay > 0) scheduledThemeTimeouts.push(setTimeout(updateThemeAfterBoundary, delay));
      });
    }

    function updateTimeAndDate() {
      const now = new Date();
      const hours = now.getHours() % 12 || 12;
      const minutes = String(now.getMinutes()).padStart(2, "0");
      timeDisplay.textContent = `${hours}:${minutes}`;
      dateDayDisplay.textContent = now.toLocaleDateString("en-US", { weekday: "short", month: "short", day: "numeric" });
      dateValueDisplay.textContent = currentLocation.city.split(",")[0];
      updateThemeByPrayerTimes();
      updateGuidance();
    }

    async function fetchWeather() {
      if (window.location.protocol === "file:") {
        weatherInfo.textContent = "Weather needs http(s)";
        return;
      }
      const params = new URLSearchParams({
        lat: currentLocation.latitude,
        lon: currentLocation.longitude,
        city: currentLocation.city,
        country: currentLocation.country
      });
      try {
        let response = await fetch(`${WEATHER_PROXY_URL}?${params.toString()}`);
        if (!response.ok) response = await fetch(WEATHER_PROXY_URL);
        if (!response.ok) throw new Error("Weather data fetch failed.");
        const data = await response.json();
        const temperature = Math.round(data.main.feels_like);
        const weatherDescription = data.weather[0].description;
        const iconCode = data.weather[0].icon;
        const iconUrl = `https://openweathermap.org/img/wn/${iconCode}@2x.png`;
        const shortDescription = weatherDescription
          .replace(/\b\w/g, (letter) => letter.toUpperCase())
          .split(" ")
          .slice(0, 2)
          .join(" ");
        weatherInfo.innerHTML = `
          <span class="weatherIconWrap" aria-hidden="true">
            <img class="weatherIconCurrent" src="${iconUrl}" alt="">
            <img class="weatherIconNext" src="${iconUrl}" alt="">
          </span>
          <span class="weatherText"><strong>${temperature}°C</strong><span>${shortDescription}</span></span>
        `;
        if (document.documentElement.classList.contains("theme-transitioning")) {
          const progress = Number(getComputedStyle(document.documentElement).getPropertyValue("--theme-split").replace("%", "")) || 0;
          updateViewportClipTargets(progress);
        }
      } catch (error) {
        console.error(error);
        weatherInfo.textContent = "Weather unavailable";
      }
    }

    function getPrayerTimesForDay(date) {
      const { coords, params } = getPrayerCalculationContext();
      const prayerTimes = new adhan.PrayerTimes(coords, date, params);
      const routine = getRoutineSettings();
      const preSunRiseTime = new Date(prayerTimes.sunrise);
      preSunRiseTime.setMinutes(preSunRiseTime.getMinutes() - routine.wakeOffsetMinutes);
      const nextDay = new Date(date);
      nextDay.setDate(nextDay.getDate() + 1);
      const nextDayPrayerTimes = new adhan.PrayerTimes(coords, nextDay, params);
      const sleepTargetTime = new Date(nextDayPrayerTimes.sunrise.getTime() - (routine.sleepHoursBeforeSunrise * 60 * 60 * 1000));
      const adjustedIshaTime = new Date(Math.max(sleepTargetTime.getTime(), prayerTimes.isha.getTime()));
      return [
        { name: "Fajr", time: preSunRiseTime, audioSrc: "static/fajr.mp3" },
        { name: "Dhuhr", time: prayerTimes.dhuhr, audioSrc: "static/azaan.mp3" },
        { name: "Asr", time: prayerTimes.asr, audioSrc: "static/azaan.mp3" },
        { name: "Maghrib", time: prayerTimes.maghrib, audioSrc: "static/azaan.mp3" },
        { name: "Isha", time: adjustedIshaTime, audioSrc: "static/azaan.mp3" }
      ];
    }

    function timeUntilNext2AM() {
      const now = new Date();
      const next2AM = new Date(now);
      next2AM.setHours(2, 0, 0, 0);
      if (next2AM < now) next2AM.setDate(next2AM.getDate() + 1);
      return next2AM - now;
    }

    function scheduleAzaan(prayers) {
      const now = new Date();
      scheduledPrayerTimeouts.forEach(clearTimeout);
      scheduledPrayerTimeouts = [];
      prayers.forEach((prayer) => {
        const delay = prayer.time.getTime() - now.getTime();
        if (delay > 0) {
          scheduledPrayerTimeouts.push(setTimeout(() => playAzaanOnce(prayer.audioSrc, prayer.name), delay));
          console.log(`Scheduled ${prayer.name} Azaan at ${prayer.time.toLocaleTimeString()}`);
        }
      });
    }

    function rescheduleAzaan() {
      const today = new Date();
      scheduleAzaan(getPrayerTimesForDay(today));
      if (dailyUpdateTimeout) clearTimeout(dailyUpdateTimeout);
      dailyUpdateTimeout = setTimeout(dailyUpdate, timeUntilNext2AM());
    }

    function playAzaanOnce(audioSrc, prayerName) {
      prayerAudio.src = audioSrc;
      prayerAudio.volume = 1;
      prayerAudio.currentTime = 0;
      prayerAudio.play()
        .then(() => console.log(`${prayerName} Azaan started playing.`))
        .catch((err) => console.error(`Error playing ${prayerName} Azaan:`, err));
    }

    function dailyUpdate() {
      const now = new Date();
      const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      scheduleAzaan(getPrayerTimesForDay(today));
      scheduleThemeBoundaryRefreshes();
      dailyUpdateTimeout = setTimeout(dailyUpdate, timeUntilNext2AM());
      console.log(`Daily update performed at ${now.toLocaleTimeString()}`);
    }

    function startSilentLoop() {
      if (isLooping) return;
      isLooping = true;
      startLoopBtn.disabled = true;
      startLoopBtn.classList.add("hidden");
      silentAudio.volume = 0;
      silentAudio.loop = true;
      silentAudio.play()
        .then(() => console.log("Silent loop started."))
        .catch((err) => console.error("Error starting silent loop:", err));
      rescheduleAzaan();
      console.log("Azaan scheduling initialized.");
    }

    function addMinutes(date, minutes) {
      return new Date(date.getTime() + minutes * 60 * 1000);
    }

    function formatPlanTime(date) {
      return date.toLocaleTimeString([], { hour: "numeric", minute: "2-digit" }).replace(/\s?(AM|PM)$/i, "").replace(/^0/, "");
    }

    function getCurrentGuidance(now = new Date()) {
      const prayers = getPrayerTimesForDay(now);
      const fajr = getPrayerByName(prayers, "Fajr").time;
      const dhuhr = getPrayerByName(prayers, "Dhuhr").time;
      const asr = getPrayerByName(prayers, "Asr").time;
      const maghrib = getPrayerByName(prayers, "Maghrib").time;
      const isha = getPrayerByName(prayers, "Isha").time;
      const routine = getRoutineSettings();
      const teaTime = addMinutes(maghrib, -routine.teaBeforeMaghribMinutes);
      const dinnerTime = addMinutes(maghrib, routine.dinnerOffsetMinutes);
      const tomorrow = new Date(now);
      tomorrow.setDate(tomorrow.getDate() + 1);
      const nextFajr = getPrayerByName(getPrayerTimesForDay(tomorrow), "Fajr").time;

      const display = getDisplaySettings();
      const icon = (emoji) => display.showEmojis ? ` ${emoji}` : "";
      if (display.guidanceTone === "plain") {
        if (now < fajr) return `Sleep. Fajr azaan ${formatPlanTime(fajr)}.`;
        if (now < dhuhr) return `Morning. Dhuhr ${formatPlanTime(dhuhr)}.`;
        if (now < asr) return `Lunch. Asr ${formatPlanTime(asr)}.`;
        if (now < teaTime) return `Afternoon. Tea around ${formatPlanTime(teaTime)}.`;
        if (now < maghrib) return `Tea. Maghrib ${formatPlanTime(maghrib)}.`;
        if (now < dinnerTime) return `Maghrib. Dinner around ${formatPlanTime(dinnerTime)}.`;
        if (now < isha) return `Dinner. Isha ${formatPlanTime(isha)}.`;
        return `Sleep. Fajr azaan ${formatPlanTime(nextFajr)}.`;
      }
      if (now < fajr) return `Sleep well${icon("🌙")} Fajr azaan ${formatPlanTime(fajr)}.`;
      if (now < dhuhr) return `Morning steady${icon("☀️")} Dhuhr ${formatPlanTime(dhuhr)}.`;
      if (now < asr) return `Lunch window${icon("🍽️")} Asr ${formatPlanTime(asr)}.`;
      if (now < teaTime) return `Afternoon. Tea around ${formatPlanTime(teaTime)}.`;
      if (now < maghrib) return `Tea time${icon("☕")} Maghrib ${formatPlanTime(maghrib)}.`;
      if (now < dinnerTime) return `Maghrib from ${formatPlanTime(maghrib)}. Dinner at ${formatPlanTime(dinnerTime)}.`;
      if (now < isha) return `Dinner time${icon("🍽️")} Isha ${formatPlanTime(isha)}.`;
      return `Wind down${icon("🌙")} Fajr azaan ${formatPlanTime(nextFajr)}.`;
    }

    function updateGuidance() {
      const guidance = getCurrentGuidance(new Date());
      messageDisplay.textContent = guidance;
      messageDisplay.dataset.text = guidance;
      if (document.documentElement.classList.contains("theme-transitioning")) {
        const progress = Number(getComputedStyle(document.documentElement).getPropertyValue("--theme-split").replace("%", "")) || 0;
        updateViewportClipTargets(progress);
      }
    }

    function openMenu() {
      settingsPanel.classList.add("is-open");
      panelScrim.classList.add("is-visible");
      settingsPanel.setAttribute("aria-hidden", "false");
    }

    function closeMenu() {
      settingsPanel.classList.remove("is-open");
      panelScrim.classList.remove("is-visible");
      settingsPanel.setAttribute("aria-hidden", "true");
    }

    function setupEdgeSwipeMenu() {
      const edgeWidth = Math.max(44, Math.min(92, window.innerWidth * 0.14));
      const swipeThreshold = 46;
      let startX = 0;
      let startY = 0;
      let tracking = false;

      document.addEventListener("touchstart", (event) => {
        if (settingsPanel.classList.contains("is-open")) return;
        const touch = event.touches[0];
        if (!touch || touch.clientX < window.innerWidth - edgeWidth) return;
        startX = touch.clientX;
        startY = touch.clientY;
        tracking = true;
      }, { passive: true });

      document.addEventListener("touchmove", (event) => {
        if (!tracking) return;
        const touch = event.touches[0];
        if (!touch) return;
        const deltaX = touch.clientX - startX;
        const deltaY = Math.abs(touch.clientY - startY);
        if (deltaX < -swipeThreshold && deltaY < 70) {
          tracking = false;
          openMenu();
        }
      }, { passive: true });

      document.addEventListener("touchend", () => {
        tracking = false;
      }, { passive: true });
    }

    function applySettings() {
      currentLocation = { ...(settings.location || DEFAULT_LOCATION) };
      settings.routine = { ...DEFAULT_ROUTINE, ...(settings.routine || {}) };
      settings.display = { ...DEFAULT_DISPLAY, ...(settings.display || {}) };
      selectedLocationLabel.textContent = `${currentLocation.city}, ${currentLocation.country}`;
      renderTimingControls();
      renderDisplayControls();
      applyDisplaySettings();
    }

    function sendHeartbeat() {
      let heartbeat = document.getElementById("heartbeat");
      if (!heartbeat) {
        heartbeat = document.createElement("div");
        heartbeat.id = "heartbeat";
        heartbeat.style.display = "none";
        document.body.appendChild(heartbeat);
      }
      heartbeat.textContent = new Date().toISOString();
    }

    function checkAudioLoop() {
      if (silentAudio.paused && isLooping) {
        silentAudio.play()
          .then(() => console.log("Silent audio loop restarted."))
          .catch((err) => console.error("Error restarting silent audio loop:", err));
      }
    }

    function reinitializeAudioLoop() {
      if (!isLooping) return;
      silentAudio.pause();
      silentAudio.currentTime = 0;
      silentAudio.play()
        .then(() => console.log("Silent audio loop reinitialized."))
        .catch((err) => console.error("Error reinitializing silent audio loop:", err));
    }

    function simulateUserInteraction() {
      document.dispatchEvent(new MouseEvent("mousemove", { view: window, bubbles: true, cancelable: true }));
    }

    countrySelect.addEventListener("change", () => {
      populateCitySelect(countrySelect.value);
      const selectedCity = getSelectedCity();
      if (selectedCity) updateLocation(selectedCity);
    });
    citySelect.addEventListener("change", () => {
      const selectedCity = getSelectedCity();
      if (selectedCity) updateLocation(selectedCity);
    });
    saveTimingBtn.addEventListener("click", saveTimingSettings);
    [fontSelect, clockScaleInput, dateScaleInput, weatherScaleInput, messageScaleInput, guidanceToneSelect, emojiToggle].forEach((control) => {
      control.addEventListener("input", previewDisplaySettings);
      control.addEventListener("change", previewDisplaySettings);
    });
    saveDisplayBtn.addEventListener("click", saveDisplaySettings);
    startLoopBtn.addEventListener("click", startSilentLoop);
    closeMenuBtn.addEventListener("click", closeMenu);
    panelScrim.addEventListener("click", closeMenu);
    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") closeMenu();
    });
    window.addEventListener("resize", () => {
      if (document.documentElement.classList.contains("theme-transitioning")) {
        const progress = Number(getComputedStyle(document.documentElement).getPropertyValue("--theme-split").replace("%", "")) || 0;
        updateViewportClipTargets(progress);
      }
    });

    applySettings();
    setupEdgeSwipeMenu();
    updateTimeAndDate();
    scheduleThemeBoundaryRefreshes();
    loadCityData();
    fetchWeather();
    sendHeartbeat();

    setInterval(updateTimeAndDate, 60000);
    setInterval(updateThemeByPrayerTimes, 1000);
    setInterval(fetchWeather, 10 * 60 * 1000);
    setInterval(() => {
      sendHeartbeat();
      checkAudioLoop();
      reinitializeAudioLoop();
      simulateUserInteraction();
    }, 5 * 60 * 1000);
  </script>
</body>
</html>
